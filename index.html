<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Predictions Workshop · CAIS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;1,14..32,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { background: #f4f4f0; font-family: 'Inter', 'Helvetica Neue', sans-serif; -webkit-font-smoothing: antialiased; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useMemo, useCallback, useEffect } = React;

const CSV_URL =
  "https://docs.google.com/spreadsheets/d/e/2PACX-1vTZtXEl-DT96E1cvhrWKCG3av9VJLJNEabrFQYXEQ9g41gOv8RQxaFOs6RotX1G7FcPuQZmsaQ57UTP/pub?gid=1224559879&single=true&output=csv";

const DOT_R   = 6.5;
const AXIS_Y  = 46;
const ROW_H   = 96;
const CHART_W = 580;
const LABEL_W = 228;

const QUESTION_LABELS = {
  1:  "Drop-in remote AI workers",
  2:  "AI-run B2B business",
  3:  "AI/automation top voter issue",
  4:  "Robots build a house",
  5:  "$100B AI-operated company",
  6:  "100× energy use",
  7:  "4+ Millennium Problems solved",
  8:  "Anti-aging therapy",
  9:  "Preserved humanity",
  10: "Humans not primary authors of culture",
  11: "Legal personhood parity",
  12: "Loss of human oversight capacity",
};

const DISCIPLINE_COLORS = [
  { key: "econom",    color: "#2563eb", label: "Economics"        },
  { key: "politi",    color: "#16a34a", label: "Political Science" },
  { key: "philosoph", color: "#7c3aed", label: "Philosophy"       },
  { key: "law",       color: "#ea580c", label: "Law"              },
  { key: "legal",     color: "#ea580c", label: "Law"              },
  { key: "sociol",    color: "#db2777", label: "Sociology"        },
  { key: "comput",    color: "#0891b2", label: "CS / Tech"        },
  { key: "tech",      color: "#0891b2", label: "CS / Tech"        },
];

function getDiscipline(b1) {
  if (!b1) return { color: "#4f46e5", label: "—" };
  const lower = b1.toLowerCase();
  for (const d of DISCIPLINE_COLORS) {
    if (lower.includes(d.key)) return { color: d.color, label: d.label };
  }
  return { color: "#64748b", label: "Other" };
}

function computeBeeswarm(data, xScale) {
  if (!data.length) return [];
  const nodes = data.map((d) => ({ ...d, x: xScale(d.value), y: 0 }));
  const sim = d3.forceSimulation(nodes)
    .force("x", d3.forceX((d) => xScale(d.value)).strength(1))
    .force("y", d3.forceY(0).strength(0.07))
    .force("collide", d3.forceCollide(DOT_R + 2).strength(0.95))
    .stop();
  for (let i = 0; i < 240; i++) sim.tick();
  return nodes;
}

function parseCSVText(text) {
  const parsed = Papa.parse(text.trim(), { header: true, skipEmptyLines: true });
  if (!parsed.data.length) throw new Error("No data rows found in spreadsheet.");
  const headers  = parsed.meta.fields;
  const nameCol  = headers.find((h) => h.trim().toLowerCase() === "name") || headers[2];
  const bgCol    = headers.find((h) => h.startsWith("B1.")) || headers[3];
  const probCols = headers.filter((h) => h.includes("Your probability"));
  if (!probCols.length)
    throw new Error("Could not find any 'Your probability' columns.");

  const responsesByQ = {};
  probCols.forEach((col, i) => {
    responsesByQ[i + 1] = parsed.data
      .filter((row) => {
        const v = Number(row[col]);
        return row[nameCol] && row[nameCol].trim() && row[col] !== "" && !isNaN(v);
      })
      .map((row) => {
        const { color, label } = getDiscipline(row[bgCol]);
        return {
          name: row[nameCol].trim(),
          value: Number(row[col]),
          disciplineColor: color,
          disciplineLabel: label,
        };
      });
  });
  return { probCols, responsesByQ, totalRows: parsed.data.length };
}

const TICKS = [0, 25, 50, 75, 100];

// ── Spinner ────────────────────────────────────────────────────────────────
function Spinner() {
  return (
    <svg width={18} height={18} viewBox="0 0 18 18" style={{ animation: "spin 0.8s linear infinite", display: "block" }}>
      <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
      <circle cx={9} cy={9} r={7} fill="none" stroke="#d1d5db" strokeWidth={2} />
      <path d="M 9 2 A 7 7 0 0 1 16 9" fill="none" stroke="#1c1917" strokeWidth={2} strokeLinecap="round" />
    </svg>
  );
}

// ── Question row ───────────────────────────────────────────────────────────
function QuestionRow({ responses, index, showDiscipline }) {
  const [tooltip, setTooltip] = useState(null);
  const xScale = useMemo(() => d3.scaleLinear().domain([0, 100]).range([0, CHART_W]), []);
  const nodes  = useMemo(() => computeBeeswarm(responses, xScale), [responses, xScale]);
  const mean   = useMemo(() => d3.mean(responses, (r) => r.value), [responses]);
  const isEven = index % 2 === 0;

  return (
    <div style={{
      display: "flex", alignItems: "center", minHeight: ROW_H,
      background: isEven ? "#ffffff" : "#fafaf9",
      borderBottom: "1px solid #e7e5e4",
    }}>
      {/* Label column */}
      <div style={{
        width: LABEL_W, minWidth: LABEL_W,
        paddingRight: 20, paddingLeft: 20, textAlign: "right",
        borderRight: "1px solid #e7e5e4",
      }}>
        <div style={{
          fontSize: 9.5, fontFamily: "'JetBrains Mono', monospace",
          color: "#a8a29e", letterSpacing: "0.1em", marginBottom: 3,
          textTransform: "uppercase",
        }}>
          Q{index + 1}
        </div>
        <div style={{ fontSize: 12.5, color: "#292524", lineHeight: 1.4, fontWeight: 500 }}>
          {QUESTION_LABELS[index + 1] || ("Question " + (index + 1))}
        </div>
        {responses.length > 0 && (
          <div style={{
            fontSize: 10, color: "#a8a29e", marginTop: 4,
            fontFamily: "'JetBrains Mono', monospace",
          }}>
            n={responses.length}
            {mean != null ? <span> · μ=<strong style={{ color: "#78716c" }}>{mean.toFixed(0)}%</strong></span> : null}
          </div>
        )}
      </div>

      {/* Chart column */}
      <div style={{ position: "relative", paddingLeft: 0 }}>
        <svg width={CHART_W} height={ROW_H}>
          {/* Subtle impossible / certain tint zones */}
          <rect x={0} y={0} width={CHART_W * 0.15} height={ROW_H} fill="rgba(220,38,38,0.03)" />
          <rect x={CHART_W * 0.85} y={0} width={CHART_W * 0.15} height={ROW_H} fill="rgba(22,163,74,0.03)" />

          {/* 50 % reference */}
          <line x1={xScale(50)} x2={xScale(50)} y1={0} y2={ROW_H}
            stroke="#e7e5e4" strokeWidth={1} />

          {/* Axis baseline */}
          <line x1={0} x2={CHART_W} y1={AXIS_Y} y2={AXIS_Y}
            stroke="#d6d3d1" strokeWidth={1} />

          {/* Tick marks */}
          {TICKS.map((v) => (
            <g key={v}>
              <line x1={xScale(v)} x2={xScale(v)} y1={AXIS_Y - 3} y2={AXIS_Y + 3}
                stroke="#c4bdb8" strokeWidth={1} />
              <text x={xScale(v)} y={ROW_H - 6} textAnchor="middle"
                fontSize={8.5} fill="#a8a29e"
                fontFamily="'JetBrains Mono', monospace">
                {v}
              </text>
            </g>
          ))}

          {/* Mean indicator */}
          {mean != null && (
            <React.Fragment>
              <line x1={xScale(mean)} x2={xScale(mean)} y1={6} y2={AXIS_Y}
                stroke="#d97706" strokeWidth={1.5} strokeDasharray="3 3" opacity={0.85} />
              <circle cx={xScale(mean)} cy={AXIS_Y} r={3} fill="#d97706" opacity={0.9} />
              <text x={xScale(mean)} y={4} textAnchor="middle" dominantBaseline="hanging"
                fontSize={8} fill="#d97706" opacity={0.9}
                fontFamily="'JetBrains Mono', monospace" fontWeight="500">
                {mean.toFixed(0)}
              </text>
            </React.Fragment>
          )}

          {/* Dots */}
          {nodes.map((node, i) => {
            const cx   = Math.max(DOT_R, Math.min(CHART_W - DOT_R, node.x));
            const cy   = Math.max(DOT_R + 14, Math.min(AXIS_Y - DOT_R - 1, AXIS_Y + node.y));
            const fill = showDiscipline ? node.disciplineColor : "#4f46e5";
            return (
              <circle key={i} cx={cx} cy={cy} r={DOT_R}
                fill={fill} fillOpacity={0.78}
                stroke="white" strokeWidth={1.5}
                style={{ cursor: "crosshair" }}
                onMouseEnter={(e) => setTooltip({
                  name: node.name, value: node.value,
                  discipline: node.disciplineLabel, color: fill,
                  x: e.clientX, y: e.clientY,
                })}
                onMouseLeave={() => setTooltip(null)}
              />
            );
          })}
        </svg>

        {tooltip && (
          <div style={{
            position: "fixed", left: tooltip.x + 14, top: tooltip.y - 20,
            background: "white",
            border: "1px solid #e7e5e4",
            borderRadius: 8, padding: "8px 13px",
            fontSize: 13, color: "#1c1917",
            pointerEvents: "none", zIndex: 9999, whiteSpace: "nowrap",
            boxShadow: "0 4px 20px rgba(0,0,0,0.10), 0 1px 4px rgba(0,0,0,0.06)",
          }}>
            <span style={{ color: tooltip.color, fontWeight: 600 }}>{tooltip.name}</span>
            {showDiscipline && tooltip.discipline && tooltip.discipline !== "—" && (
              <span style={{ color: "#a8a29e", fontSize: 11, marginLeft: 7 }}>
                {tooltip.discipline}
              </span>
            )}
            <span style={{ color: "#d6d3d1", margin: "0 8px" }}>·</span>
            <span style={{ fontWeight: 700, fontFamily: "'JetBrains Mono', monospace" }}>
              {tooltip.value}%
            </span>
          </div>
        )}
      </div>
    </div>
  );
}

// ── Toggle button ──────────────────────────────────────────────────────────
function ToggleBtn({ active, onClick, children }) {
  return (
    <button onClick={onClick} style={{
      background: active ? "#1c1917" : "white",
      color:      active ? "white"   : "#44403c",
      border:     "1px solid " + (active ? "#1c1917" : "#d6d3d1"),
      borderRadius: 7, padding: "6px 14px", fontSize: 12,
      cursor: "pointer", fontFamily: "'Inter', sans-serif", fontWeight: 500,
      transition: "all 0.12s",
      display: "flex", alignItems: "center", gap: 6,
    }}>
      {children}
    </button>
  );
}

// ── App ────────────────────────────────────────────────────────────────────
function App() {
  const [parsed,      setParsed]      = useState(null);
  const [status,      setStatus]      = useState("idle");   // idle | loading | error | cors | done
  const [errorMsg,    setErrorMsg]    = useState("");
  const [showDisc,    setShowDisc]    = useState(false);
  const [lastUpdated, setLastUpdated] = useState(null);
  const [csvText,     setCsvText]     = useState("");
  const [pasteError,  setPasteError]  = useState("");
  const [countdown,   setCountdown]   = useState(60);
  const POLL_INTERVAL = 60; // seconds

  const applyCSV = useCallback((text) => {
    const result = parseCSVText(text);
    setParsed(result);
    setLastUpdated(new Date());
    setStatus("done");
  }, []);

  const load = useCallback(async () => {
    setStatus("loading");
    setErrorMsg("");
    try {
      const res = await fetch(CSV_URL);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const text = await res.text();
      if (!text.trim()) throw new Error("empty");
      applyCSV(text);
    } catch (e) {
      // CORS / file:// protocol — fall back to manual paste
      if (e instanceof TypeError || e.message === "Failed to fetch" || e.message.includes("fetch")) {
        setStatus("cors");
      } else {
        setErrorMsg(e.message);
        setStatus("error");
      }
    }
  }, [applyCSV]);

  const loadFromPaste = useCallback(() => {
    setPasteError("");
    try {
      applyCSV(csvText);
    } catch (e) {
      setPasteError(e.message);
    }
  }, [csvText, applyCSV]);

  // Initial load
  useEffect(() => { load(); }, [load]);

  // Auto-refresh polling — only when fetch succeeds (i.e. not file:// context)
  useEffect(() => {
    if (status === "cors") return; // don't poll in paste-fallback mode
    setCountdown(POLL_INTERVAL);
    const tick = setInterval(() => {
      setCountdown((c) => {
        if (c <= 1) {
          load();
          return POLL_INTERVAL;
        }
        return c - 1;
      });
    }, 1000);
    return () => clearInterval(tick);
  }, [status, load]);

  const disciplines = useMemo(() => {
    if (!parsed) return [];
    const seen = new Map();
    Object.values(parsed.responsesByQ).forEach((rs) =>
      rs.forEach((r) => {
        if (!seen.has(r.disciplineLabel)) seen.set(r.disciplineLabel, r.disciplineColor);
      })
    );
    return [...seen.entries()].map(([label, color]) => ({ label, color }));
  }, [parsed]);

  const timeStr = lastUpdated
    ? lastUpdated.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })
    : null;

  return (
    <div style={{
      minHeight: "100vh",
      background: "#f4f4f0",
      fontFamily: "'Inter', 'Helvetica Neue', sans-serif",
      color: "#1c1917",
    }}>

      {/* ── Nav bar ── */}
      <header style={{
        background: "white",
        borderBottom: "1px solid #e7e5e4",
        padding: "0 36px",
        height: 56,
        display: "flex", alignItems: "center", justifyContent: "space-between",
      }}>
        {/* Wordmark */}
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <div style={{
            fontSize: 13, fontWeight: 700, color: "#1c1917",
            letterSpacing: "-0.01em",
          }}>
            CAIS
          </div>
          <div style={{ width: 1, height: 16, background: "#e7e5e4" }} />
          <div style={{ fontSize: 12, color: "#78716c", fontWeight: 400 }}>
            AI &amp; Society Fellowship
          </div>
        </div>

        {/* Status / controls */}
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          {status === "loading" && <Spinner />}
          {timeStr && status !== "loading" && status !== "cors" && (
            <span style={{
              fontSize: 11, color: "#a8a29e",
              fontFamily: "'JetBrains Mono', monospace",
            }}>
              {timeStr} · ↻ {countdown}s
            </span>
          )}
          <button onClick={load} disabled={status === "loading"} style={{
            background: "white", border: "1px solid #d6d3d1", borderRadius: 7,
            padding: "5px 13px", fontSize: 12, color: "#44403c",
            cursor: status === "loading" ? "not-allowed" : "pointer",
            fontFamily: "'Inter', sans-serif", fontWeight: 500,
            opacity: status === "loading" ? 0.5 : 1,
            display: "flex", alignItems: "center", gap: 5,
          }}>
            <span style={{ fontSize: 13 }}>↺</span> Refresh
          </button>
        </div>
      </header>

      {/* ── Page body ── */}
      <main style={{ maxWidth: 900, margin: "0 auto", padding: "32px 36px 64px" }}>

        {/* Page title */}
        <div style={{ marginBottom: 24 }}>
          <div style={{
            fontSize: 9.5, fontFamily: "'JetBrains Mono', monospace",
            letterSpacing: "0.14em", textTransform: "uppercase",
            color: "#dc2626", marginBottom: 8, fontWeight: 500,
          }}>
            Predictions Workshop
          </div>
          <h1 style={{
            fontSize: 28, fontWeight: 700, color: "#1c1917",
            margin: 0, letterSpacing: "-0.025em", lineHeight: 1.2,
          }}>
            Forecasting AI&thinsp;·&thinsp;2026–2060
          </h1>
          {parsed && (
            <p style={{
              fontSize: 13, color: "#78716c", margin: "8px 0 0",
              fontFamily: "'JetBrains Mono', monospace",
            }}>
              {parsed.totalRows} response{parsed.totalRows !== 1 ? "s" : ""} ·{" "}
              {parsed.probCols.length} questions
            </p>
          )}
        </div>

        {/* Loading skeleton */}
        {status === "loading" && !parsed && (
          <div style={{
            background: "white", border: "1px solid #e7e5e4", borderRadius: 10,
            padding: "56px 0", textAlign: "center",
            color: "#a8a29e", fontSize: 13,
            fontFamily: "'JetBrains Mono', monospace",
          }}>
            Loading responses…
          </div>
        )}

        {/* Generic error state */}
        {status === "error" && (
          <div style={{
            background: "#fef2f2", border: "1px solid #fecaca",
            borderRadius: 8, padding: "14px 18px",
            color: "#b91c1c", fontSize: 13,
            fontFamily: "'JetBrains Mono', monospace",
          }}>
            ⚠ {errorMsg}
          </div>
        )}

        {/* CORS / file:// fallback — paste UI */}
        {status === "cors" && !parsed && (
          <div style={{
            background: "white", border: "1px solid #e7e5e4",
            borderRadius: 10, padding: "24px 28px",
          }}>
            <div style={{
              fontSize: 9.5, fontFamily: "'JetBrains Mono', monospace",
              letterSpacing: "0.1em", textTransform: "uppercase",
              color: "#a8a29e", marginBottom: 10,
            }}>
              Paste CSV to load responses
            </div>
            <p style={{ fontSize: 13, color: "#78716c", margin: "0 0 14px", lineHeight: 1.6 }}>
              Auto-fetch is blocked when opening this file locally.{" "}
              In Google Sheets → <strong>File → Download → Comma Separated Values</strong>,
              then open the file, select all, copy, and paste below.
            </p>
            <textarea
              value={csvText}
              onChange={(e) => setCsvText(e.target.value)}
              placeholder="Timestamp,Email Address,Name,B1. Your professional background…"
              style={{
                width: "100%", height: 100,
                background: "#fafaf9",
                border: "1px solid #e7e5e4", borderRadius: 7,
                padding: "10px 12px", color: "#1c1917",
                fontSize: 11.5, fontFamily: "'JetBrains Mono', monospace",
                resize: "vertical", outline: "none", boxSizing: "border-box",
              }}
            />
            {pasteError && (
              <div style={{ marginTop: 8, fontSize: 12, color: "#b91c1c", fontFamily: "'JetBrains Mono', monospace" }}>
                ⚠ {pasteError}
              </div>
            )}
            <div style={{ display: "flex", gap: 10, marginTop: 12, alignItems: "center" }}>
              <button
                onClick={loadFromPaste}
                disabled={!csvText.trim()}
                style={{
                  background: csvText.trim() ? "#1c1917" : "#e7e5e4",
                  color: csvText.trim() ? "white" : "#a8a29e",
                  border: "none", borderRadius: 7,
                  padding: "8px 20px", fontSize: 13, fontWeight: 600,
                  cursor: csvText.trim() ? "pointer" : "not-allowed",
                  fontFamily: "'Inter', sans-serif",
                }}
              >
                Load →
              </button>
              <span style={{ fontSize: 11, color: "#a8a29e", fontFamily: "'JetBrains Mono', monospace" }}>
                or serve this file from a web server for auto-fetch
              </span>
            </div>
          </div>
        )}

        {parsed && (
          <>
            {/* Controls row */}
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 16, flexWrap: "wrap" }}>
              <ToggleBtn active={showDisc} onClick={() => setShowDisc(v => !v)}>
                <span style={{
                  width: 8, height: 8, borderRadius: "50%",
                  background: showDisc ? "white" : "#4f46e5",
                  display: "inline-block",
                }} />
                By discipline
              </ToggleBtn>
            </div>

            {/* Legend */}
            <div style={{
              display: "flex", gap: 20, marginBottom: 14,
              fontSize: 10.5, color: "#78716c", alignItems: "center",
              fontFamily: "'JetBrains Mono', monospace", letterSpacing: "0.04em",
              flexWrap: "wrap",
            }}>
              <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                <svg width={13} height={13}>
                  <circle cx={6.5} cy={6.5} r={5} fill="#4f46e5" fillOpacity={0.78}
                    stroke="white" strokeWidth={1.5} />
                </svg>
                PARTICIPANT — HOVER TO IDENTIFY
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                <svg width={22} height={10}>
                  <line x1={0} x2={22} y1={5} y2={5} stroke="#d97706"
                    strokeWidth={1.5} strokeDasharray="3 3" opacity={0.9} />
                  <circle cx={11} cy={5} r={2.5} fill="#d97706" opacity={0.9} />
                </svg>
                GROUP MEAN
              </div>
              <div style={{ marginLeft: "auto", display: "flex", gap: 10, color: "#a8a29e", fontSize: 10 }}>
                <span style={{ color: "#dc2626", opacity: 0.7 }}>0 = impossible</span>
                <span>·  50 = coin flip</span>
                <span style={{ color: "#16a34a", opacity: 0.7 }}>·  100 = certain</span>
              </div>
            </div>

            {/* Discipline legend */}
            {showDisc && disciplines.length > 0 && (
              <div style={{
                display: "flex", gap: 14, flexWrap: "wrap",
                fontSize: 10.5, color: "#78716c",
                fontFamily: "'JetBrains Mono', monospace",
                letterSpacing: "0.05em", marginBottom: 14,
              }}>
                {disciplines.map(({ label, color }) => (
                  <div key={label} style={{ display: "flex", alignItems: "center", gap: 5 }}>
                    <div style={{
                      width: 8, height: 8, borderRadius: "50%",
                      background: color, opacity: 0.85,
                    }} />
                    {label.toUpperCase()}
                  </div>
                ))}
              </div>
            )}

            {/* Chart container */}
            <div style={{
              background: "white",
              border: "1px solid #e7e5e4",
              borderRadius: 10,
              overflow: "hidden",
              overflowX: "auto",
            }}>
              {parsed.probCols.map((col, i) => (
                <QuestionRow
                  key={col}
                  responses={parsed.responsesByQ[i + 1] || []}
                  index={i}
                  showDiscipline={showDisc}
                />
              ))}
            </div>

            <p style={{
              fontSize: 11, color: "#a8a29e", marginTop: 16,
              fontFamily: "'JetBrains Mono', monospace", textAlign: "right",
            }}>
              Data pulled live from Google Forms · Center for AI Safety
            </p>
          </>
        )}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
